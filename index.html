<!DOCTYPE html>
<html>
<head>
  <title>Tri-brella | Limited Bumbrella</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      color: #111;
    }

    .topbar {
      background: black;
      color: white;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
    }

    .hero {
      padding: 60px 20px;
    }

    h1 {
      font-size: 45px;
      margin-bottom: 10px;
    }

    p {
      font-size: 22px;
    }

    .card {
      background: white;
      margin: 30px auto;
      padding: 30px;
      max-width: 700px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    img {
      width: 90%;
      max-width: 550px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 35px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 18px;
      transition: 0.3s;
    }

    .button:hover {
      transform: scale(1.08);
    }

    .limited {
      color: red;
      font-weight: bold;
      font-size: 25px;
    }
  </style>
</head>

<body>

<div class="topbar">
  Limited Bumbrella
</div>

<div class="hero">

  <h1>Tri-brella</h1>
  <p>The future of umbrellas.</p>

  <div class="card">

    <h1>Limited Bumbrella</h1>

    <p class="limited">
      LIMITED EDITION!
    </p>

    <p>
      Limited Bumbrella — get it now!  
      Only available for a limited time.
    </p>

    <img src="https://share.gemini.google/fxscwv0DJOFm" alt="Limited Bumbrella">

    <br>

    <a class="button" href="#">
      Get Your Limited Bumbrella
    </a>

  </div>

</div>

</body>
</html>
